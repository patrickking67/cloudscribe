<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>CloudScribe Logo</title>
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Cloud body -->
  <g filter="url(#shadow)">
    <path d="
      M 52 120
      C 32 120 20 106 20 92
      C 20 78 30 66 44 64
      C 44 44 60 28 82 28
      C 100 28 116 40 120 56
      C 122 55 125 54 128 54
      C 146 54 160 68 160 86
      C 160 104 146 118 128 120
      Z
    " fill="url(#cloudGrad)"/>
  </g>

  <!-- Pen/scribe icon integrated into cloud -->
  <g transform="translate(72, 52)">
    <!-- Pen body -->
    <rect x="14" y="0" width="28" height="42" rx="4" fill="url(#penGrad)" opacity="0.95"/>
    <!-- Pen tip -->
    <polygon points="14,42 42,42 28,58" fill="url(#penGrad)" opacity="0.95"/>
    <!-- Code lines on pen -->
    <line x1="20" y1="10" x2="36" y2="10" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="18" x2="30" y2="18" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="26" x2="34" y2="26" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="28" y2="34" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Angle brackets < > flanking the pen -->
  <text x="62" y="98" font-family="'SF Mono', 'Fira Code', monospace" font-size="28" font-weight="700" fill="#ffffff" opacity="0.9">&lt;</text>
  <text x="118" y="98" font-family="'SF Mono', 'Fira Code', monospace" font-size="28" font-weight="700" fill="#ffffff" opacity="0.9">&gt;</text>

  <!-- CloudScribe wordmark -->
  <text x="100" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b" letter-spacing="-0.5">
    <tspan fill="#3b82f6">Cloud</tspan><tspan fill="#6366f1">Scribe</tspan>
  </text>

  <!-- Tagline -->
  <text x="100" y="174" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" letter-spacing="2">
    IT AUTOMATION
  </text>
</svg>
