<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>CloudScribe</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Cloud shape — centered, balanced -->
  <g transform="translate(256,232)">
    <path d="
      M -140 30
      C -140 30 -155 30 -155 10
      C -155 -12 -135 -25 -115 -25
      C -110 -60 -75 -85 -35 -85
      C -5 -85 20 -72 35 -52
      C 42 -56 50 -58 60 -58
      C 90 -58 115 -38 118 -10
      C 135 -6 148 10 148 30
      C 148 52 132 68 110 68
      L -110 68
      C -132 68 -148 52 -148 34
      Z
    " fill="url(#cloud)"/>
  </g>

  <!-- Terminal prompt inside cloud -->
  <g transform="translate(256,240)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- > cursor -->
    <polyline points="-42,-18 -20,2 -42,22" stroke="url(#accent)" stroke-width="14"/>
    <!-- Typing line -->
    <line x1="-4" y1="22" x2="60" y2="22" stroke="url(#accent)" stroke-width="14"/>
  </g>
</svg>
